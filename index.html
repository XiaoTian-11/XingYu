        // 4. 页面切换函数
        function showPage(pageId) {
            // 隐藏所有页面
            document.querySelectorAll('[id$="-page"]').forEach(page => {
                page.classList.add('hidden');
            });
            // 显示目标页面
            document.getElementById(pageId).classList.remove('hidden');
        }

        // 5. 加载历史记录
        function loadHistoryRecords() {
            const history = JSON.parse(localStorage.getItem('energyTestHistory')) || [];
            const historyContainer = document.getElementById('history-records');
            const noHistoryText = document.getElementById('no-history');
            
            if (history.length === 0) {
                noHistoryText.style.display = 'block';
                return;
            }
            
            noHistoryText.style.display = 'none';
            historyContainer.innerHTML = '';
            
            // 按时间倒序排列
            history.sort((a, b) => new Date(b.testTime) - new Date(a.testTime));
            
            history.forEach((record, index) => {
                const recordCard = document.createElement('div');
                recordCard.className = 'bg-white rounded-lg shadow-sm p-4 mb-3 transition-all-smooth hover:shadow-md';
                recordCard.innerHTML = `
                    <div class="flex justify-between items-center mb-2">
                        <span class="font-medium text-calm-700">第${index + 1}次测试</span>
                        <span class="text-sm text-gentle-500">${new Date(record.testTime).toLocaleString()}</span>
                    </div>
                    <div class="text-sm text-gentle-700">
                        整体能量分值：<span class="font-semibold text-calm-600">${record.totalScore}</span>
                        <span class="ml-2">(${record.energyLevel})</span>
                    </div>
                `;
                historyContainer.appendChild(recordCard);
            });
        }

        // 6. 渲染当前题目
        function renderCurrentQuestion() {
            const currentQuestion = quizQuestions[currentQuestionIndex];
            const questionText = document.getElementById('question-text');
            const optionsContainer = document.getElementById('options-container');
            const progressText = document.getElementById('progress-text');
            const progressPercent = document.getElementById('progress-percent');
            const progressBar = document.getElementById('progress-bar');
            
            // 更新进度
            const currentNum = currentQuestionIndex + 1;
            const percent = ((currentNum) / totalQuestions) * 100;
            progressText.textContent = `第 ${currentNum}/${totalQuestions} 题`;
            progressPercent.textContent = `${percent.toFixed(1)}%`;
            progressBar.style.width = `${percent}%`;
            
            // 更新上一题按钮状态
            document.getElementById('prev-btn').disabled = currentQuestionIndex === 0;
            
            // 渲染题目
            questionText.textContent = currentQuestion.text;
            optionsContainer.innerHTML = '';
            
            // 渲染选项
            currentQuestion.options.forEach(option => {
                const optionBtn = document.createElement('button');
                optionBtn.className = `w-full text-left p-4 rounded-xl transition-all-smooth ${userAnswers[currentQuestion.id] === option.score ? 'bg-calm-100 border-2 border-calm-500' : 'bg-gentle-50 hover:bg-gentle-100 border border-gentle-200'}`;
                optionBtn.innerHTML = option.text;
                
                optionBtn.addEventListener('click', () => {
                    // 保存答案
                    userAnswers[currentQuestion.id] = option.score;
                    // 高亮选中的选项
                    optionsContainer.querySelectorAll('button').forEach(btn => {
                        btn.className = 'w-full text-left p-4 rounded-xl transition-all-smooth bg-gentle-50 hover:bg-gentle-100 border border-gentle-200';
                    });
                    optionBtn.className = 'w-full text-left p-4 rounded-xl transition-all-smooth bg-calm-100 border-2 border-calm-500';
                });
                
                optionsContainer.appendChild(optionBtn);
            });
        }

        // 7. 计算各维度分值
        function calculateDimensionScores() {
            // 重置分值
            for (let dimension in dimensionScores) {
                dimensionScores[dimension] = 0;
            }
            
            // 累加各维度分值
            quizQuestions.forEach(question => {
                if (userAnswers[question.id]) {
                    dimensionScores[question.dimension] += userAnswers[question.id];
                }
            });
            
            // 转换为0-100分制
            const normalizedScores = {};
            for (let dimension in dimensionScores) {
                normalizedScores[dimension] = Math.round((dimensionScores[dimension] / maxScorePerDimension) * 100);
            }
            
            return normalizedScores;
        }

        // 8. 获取能量层级
        function getEnergyLevel(totalScore) {
            if (totalScore < 20) return "羞愧/内疚（低能量）";
            if (totalScore < 40) return "恐惧/焦虑（低能量）";
            if (totalScore < 60) return "欲望/愤怒（中低能量）";
            if (totalScore < 70) return "勇气/淡定（中能量）";
            if (totalScore < 80) return "主动/宽容（中高能量）";
            if (totalScore < 90) return "明智/爱（高能量）";
            return "喜悦/平和（超高能量）";
        }

        // 9. 生成整体分析
        function generateOverallAnalysis(totalScore, energyLevel) {
            if (totalScore < 40) {
                return `你的整体能量频率分值为${totalScore}分，处于${energyLevel}阶段。当前你的内在能量较为低迷，容易被负面情绪影响，对生活缺乏信心和动力。这是非常正常的状态，每个人都会经历能量低谷。建议你从简单的小事开始，比如每天花10分钟冥想、接触自然，逐步提升自己的能量频率，慢慢走出低谷。`;
            } else if (totalScore < 70) {
                return `你的整体能量频率分值为${totalScore}分，处于${energyLevel}阶段。你的内在能量处于中等水平，具备一定的情绪稳定性和行动意愿，但仍有提升的空间。你已有能力面对生活中的挑战，只需更多地关注自己的内心感受，接纳自己的不完美，就能逐步提升能量频率，体验更多的平和与喜悦。`;
            } else if (totalScore < 90) {
                return `你的整体能量频率分值为${totalScore}分，处于${energyLevel}阶段。你的内在能量处于较高水平，具备强大的勇气、爱与明智，能够从容面对生活的各种境遇。你已经能够从内在获得满足和快乐，继续保持这份状态，你的能量会吸引更多美好的事物，也会给身边的人带来温暖和力量。`;
            } else {
                return `你的整体能量频率分值为${totalScore}分，处于${energyLevel}阶段。恭喜你！你的内在能量处于高阶状态，具备全然的平和与喜悦，能够接纳生活的一切，不受外界干扰。这种高频率的能量会让你体验到生命的本质美好，继续保持这份内在的宁静，你的存在本身就是一种治愈。`;
            }
        }

        // 10. 渲染报告页面
        function renderReport() {
            // 计算各维度标准化分值（0-100）
            const normalizedScores = calculateDimensionScores();
            
            // 计算总分
            const totalScore = Math.round(Object.values(normalizedScores).reduce((a, b) => a + b, 0) / Object.keys(normalizedScores).length);
            const energyLevel = getEnergyLevel(totalScore);
            
            // 更新总分显示
            document.getElementById('total-energy-score').textContent = `整体能量频率：${totalScore}分 | ${energyLevel}`;
            
            // 生成整体分析
            document.getElementById('overall-analysis').textContent = generateOverallAnalysis(totalScore, energyLevel);
            
            // 渲染雷达图
            const ctx = document.getElementById('energy-radar-chart').getContext('2d');
            // 销毁已存在的图表
            if (window.radarChart) {
                window.radarChart.destroy();
            }
            
            window.radarChart = new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: Object.keys(normalizedScores),
                    datasets: [{
                        label: '你的能量分值',
                        data: Object.values(normalizedScores),
                        backgroundColor: 'rgba(130, 201, 157, 0.2)',
                        borderColor: 'rgba(92, 184, 92, 1)',
                        borderWidth: 2,
                        pointBackgroundColor: 'rgba(92, 184, 92, 1)',
                        pointRadius: 4
                    }]
                },
                options: {
                    scales: {
                        r: {
                            beginAtZero: true,
                            max: 100,
                            ticks: {
                                stepSize: 20,
                                font: {
                                    size: 12
                                }
                            },
                            grid: {
                                color: 'rgba(200, 200, 200, 0.2)'
                            },
                            angleLines: {
                                color: 'rgba(200, 200, 200, 0.4)'
                            },
                            pointLabels: {
                                font: {
                                    size: 14,
                                    weight: '500'
                                },
                                color: '#455a64'
                            }
                        }
                    },
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: {
                                font: {
                                    size: 12
                                }
                            }
                        },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    return `${context.label}：${context.raw}分`;
                                }
                            }
                        }
                    },
                    animation: {
                        duration: 2000,
                        easing: 'easeOutQuart'
                    }
                }
            });
            
            // 渲染各维度详细解释
            const dimensionDetails = document.getElementById('dimension-details');
            dimensionDetails.innerHTML = '';
            
            for (let dimension in normalizedScores) {
                const score = normalizedScores[dimension];
                let explanationType = 'medium';
                if (score < 40) explanationType = 'low';
                if (score >= 80) explanationType = 'high';
                
                const dimensionCard = document.createElement('div');
                dimensionCard.className = 'bg-gentle-50 rounded-xl p-4 mb-3';
                dimensionCard.innerHTML = `
                    <div class="flex justify-between items-center mb-2">
                        <h4 class="font-semibold text-gentle-800">${dimension}</h4>
                        <span class="text-calm-600 font-medium">${score}分</span>
                    </div>
                    <div class="w-full h-1.5 bg-gentle-200 rounded-full mb-3">
                        <div class="h-full bg-calm-500 rounded-full transition-all-smooth" style="width: ${score}%"></div>
                    </div>
                    <p class="text-sm text-gentle-700">${dimensionExplanations[dimension][explanationType]}</p>
                `;
                dimensionDetails.appendChild(dimensionCard);
            }
            
            // 保存测试记录到本地存储
            const testRecord = {
                testTime: new Date().toISOString(),
                totalScore: totalScore,
                energyLevel: energyLevel,
                dimensionScores: normalizedScores
            };
            
            const history = JSON.parse(localStorage.getItem('energyTestHistory')) || [];
            history.push(testRecord);
            localStorage.setItem('energyTestHistory', JSON.stringify(history));
        }

        // 11. 模拟演算动画
        function simulateCalculation() {
            const progressBar = document.getElementById('calculating-progress');
            let progress = 0;
            const interval = setInterval(() => {
                progress += Math.random() * 5;
                if (progress >= 100) {
                    progress = 100;
                    clearInterval(interval);
                    // 跳转到报告页
                    setTimeout(() => {
                        showPage('report-page');
                        renderReport();
                    }, 500);
                }
                progressBar.style.width = `${progress}%`;
            }, 100);
        }

        // 12. 事件监听
        // 页面加载完成
        document.addEventListener('DOMContentLoaded', () => {
            // 加载历史记录
            loadHistoryRecords();
            
            // 开始测试按钮
            document.getElementById('start-test').addEventListener('click', () => {
                // 重置答题状态
                currentQuestionIndex = 0;
                userAnswers = {};
                dimensionScores = {
                    "勇气": 0,
                    "淡定": 0,
                    "主动": 0,
                    "宽容": 0,
                    "明智": 0,
                    "爱": 0,
                    "喜悦": 0,
                    "平和": 0
                };
                
                showPage('quiz-page');
                renderCurrentQuestion();
            });
            
            // 上一题按钮
            document.getElementById('prev-btn').addEventListener('click', () => {
                if (currentQuestionIndex > 0) {
                    currentQuestionIndex--;
                    renderCurrentQuestion();
                }
            });
            
            // 下一题按钮
            document.getElementById('next-btn').addEventListener('click', () => {
                const currentQuestion = quizQuestions[currentQuestionIndex];
                // 检查是否选择了选项
                if (!userAnswers[currentQuestion.id]) {
                    alert('请选择一个选项后继续～');
                    return;
                }
                
                // 最后一题，跳演算页
                if (currentQuestionIndex === totalQuestions - 1) {
                    showPage('calculating-page');
                    simulateCalculation();
                    return;
                }
                
                // 下一题
                currentQuestionIndex++;
                renderCurrentQuestion();
            });
            
            // 重新测试按钮
            document.getElementById('restart-test').addEventListener('click', () => {
                showPage('cover-page');
                loadHistoryRecords(); // 刷新历史记录
            });
            
            // 分享测试按钮
            document.getElementById('share-test').addEventListener('click', () => {
                // 复制当前页面链接
                navigator.clipboard.writeText(window.location.href).then(() => {
                    alert('测试链接已复制到剪贴板，分享给朋友吧～');
                });
            });
        });
    </script>
</body>
</html>
